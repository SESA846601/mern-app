apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # containers:
      # - name: frontend
      #   image: anshulsatone/frontend:latest
      #   imagePullPolicy: Always
      #   ports:
      #   - containerPort: 3000
      containers:
      - name: frontend
        image: anshulsatone/frontend:latest
        imagePullPolicy: Always
        ports:
          - containerPort: 3000
        command: ["serve"]
        args: ["-s", "build", "-l", "3000"]
        env:
          - name: REACT_APP_API_URL
            value: "http://backend-service:5000"  # Replace with your backend ClusterIP service
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: production
spec:
  selector:
    app: frontend
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 31000